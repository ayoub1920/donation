apiVersion: apps/v1
kind: Deployment
metadata:
  name: donation-backend
  labels:
    app: donation-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: donation-backend
  template:
    metadata:
      labels:
        app: donation-backend
    spec:
      containers:
      - name: donation-backend
        image: donation-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres-service:5432/donation
        - name: SPRING_DATASOURCE_USERNAME
          value: postgres
        - name: SPRING_DATASOURCE_PASSWORD
          value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: donation-service
spec:
  selector:
    app: donation-backend
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
  type: NodePort
