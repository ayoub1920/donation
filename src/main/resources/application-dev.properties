spring.application.name=donation
server.port=8084

# H2 in-memory database for dev profile (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:donationsdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Eureka in dev to avoid registration failures
eureka.client.enabled=false

# Logging
logging.level.org.hibernate.SQL=warn
logging.level.org.springframework=info
